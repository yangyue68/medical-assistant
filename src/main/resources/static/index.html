<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>硅谷小智 - 北京协和医学院智能医疗助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 1400px;
            height: 90vh;
            display: flex;
            gap: 16px;
        }

        .sidebar {
            width: 280px;
            background: white;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            flex-shrink: 0;
        }

        .sidebar-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 16px;
            color: white;
        }

        .sidebar-header h3 {
            font-size: 1rem;
            margin-bottom: 12px;
        }

        .new-chat-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .session-item {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fc;
        }

        .session-item:hover {
            background: #eef2ff;
        }

        .session-item.active {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-left: 3px solid #667eea;
        }

        .session-info {
            flex: 1;
            overflow: hidden;
        }

        .session-title {
            font-size: 0.85rem;
            font-weight: 500;
            color: #1f2937;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-time {
            font-size: 0.7rem;
            color: #9ca3af;
            margin-top: 4px;
        }

        .delete-session {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 1rem;
            opacity: 0;
            transition: all 0.2s;
        }

        .session-item:hover .delete-session {
            opacity: 1;
        }

        .delete-session:hover {
            background: #fee2e2;
            color: #ef4444;
        }

        .chat-container {
            flex: 1;
            background: white;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .header-info {
            flex: 1;
        }

        .header-info h1 {
            color: white;
            font-size: 1.1rem;
        }

        .header-info p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.7rem;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            background: #f8f9fc;
        }

        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #e5e7eb;
            border-radius: 3px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        /* 关键修复：消息容器高度自动，不要多余空白 */
        .message {
            display: flex;
            margin-bottom: 8px;
            position: relative;
            line-height: 1.4;
        }

        .message:last-child {
            margin-bottom: 0;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-right: 8px;
            color: white;
        }

        .message.user .message-avatar {
            background: #e5e7eb;
            margin-left: 8px;
            order: 2;
        }

        .message-content-wrapper {
            max-width: 80%;
            position: relative;
        }

        .message-bubble {
            padding: 6px 12px;
            border-radius: 16px;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .message.assistant .message-bubble {
            background: white;
            color: #1f2937;
            border-bottom-left-radius: 3px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 3px;
        }

        /* 思考过程 - 紧凑 */
        .thinking-content {
            color: #9ca3af;
            font-style: italic;
            font-size: 0.75rem;
            border-left: 2px solid #d1d5db;
            padding-left: 8px;
            margin-bottom: 4px;
        }

        /* 正式回答 */
        .answer-content {
            color: #1f2937;
        }

        .message.user .answer-content {
            color: white;
        }

        /* 复制按钮 */
        .copy-btn {
            position: absolute;
            right: 4px;
            top: 4px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #e5e7eb;
            border-radius: 5px;
            padding: 2px 6px;
            font-size: 0.6rem;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s;
            color: #6b7280;
            display: flex;
            align-items: center;
            gap: 2px;
            z-index: 10;
        }

        .message.assistant .message-content-wrapper:hover .copy-btn {
            opacity: 1;
        }

        .copy-btn:hover {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        .copy-btn.copied {
            background: #10b981;
            border-color: #10b981;
            color: white;
            opacity: 1;
        }

        /* 打字光标 */
        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #667eea;
            margin-left: 2px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .input-footer {
            background: white;
            border-top: 1px solid #e5e7eb;
            flex-shrink: 0;
        }

        .quick-questions {
            padding: 8px 20px;
            background: #f8f9fc;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid #e5e7eb;
        }

        .quick-questions::-webkit-scrollbar {
            height: 3px;
        }

        .quick-question {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 5px 12px;
            font-size: 0.7rem;
            color: #4b5563;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .quick-question:hover {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        .input-area {
            padding: 10px 20px;
            background: white;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            background: #f3f4f6;
            border-radius: 20px;
            padding: 6px 14px;
            transition: all 0.3s;
        }

        .input-wrapper:focus-within {
            background: white;
            box-shadow: 0 0 0 2px #667eea;
        }

        .message-input {
            width: 100%;
            border: none;
            background: transparent;
            outline: none;
            font-size: 0.85rem;
            resize: none;
            font-family: inherit;
            min-height: 20px;
            max-height: 80px;
            line-height: 1.4;
            overflow-y: auto;
        }

        .message-input::-webkit-scrollbar {
            width: 3px;
        }

        .message-input::placeholder {
            color: #9ca3af;
        }

        .send-btn {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            z-index: 1000;
            animation: fadeInOut 2s ease;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .app-container {
                flex-direction: column;
                gap: 10px;
            }
            .sidebar {
                width: 100%;
                height: 180px;
                order: 2;
            }
            .chat-container {
                order: 1;
            }
            .message-content-wrapper {
                max-width: 85%;
            }
            .quick-questions {
                padding: 6px 16px;
            }
            .input-area {
                padding: 8px 16px;
            }
            .messages-area {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>📋 历史会话</h3>
            <button class="new-chat-btn" id="newChatBtn">
                ✨ 新建会话
            </button>
        </div>
        <div class="session-list" id="sessionList"></div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">🏥</div>
            <div class="header-info">
                <h1>硅谷小智 · 医疗版</h1>
                <p>北京协和医学院 · 智能诊疗助手</p>
            </div>
            <div class="status">
                <div class="status-dot"></div>
                <span class="status-text">在线服务中</span>
            </div>
        </div>

        <div class="messages-area" id="messagesArea"></div>

        <div class="input-footer">
            <div class="quick-questions">
                <div class="quick-question" data-question="我头痛应该挂什么科？">🤕 头痛应该挂什么科？</div>
                <div class="quick-question" data-question="我想预约挂号">📅 我想预约挂号</div>
                <div class="quick-question" data-question="神经内科有哪些医生？">👨‍⚕️ 神经内科有哪些医生？</div>
                <div class="quick-question" data-question="医院地址在哪里？">📍 医院地址在哪里？</div>
                <div class="quick-question" data-question="取消预约">❌ 取消预约</div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                        <textarea
                                class="message-input"
                                id="messageInput"
                                placeholder="输入您的健康问题..."
                                rows="1"
                        ></textarea>
                </div>
                <button class="send-btn" id="sendBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'xiaozhi_sessions';
    const BACKEND_URL = 'http://localhost:8080';

    let currentSessionId = null;
    let isWaiting = false;
    let currentStreamingDiv = null;
    let currentStreamingContent = '';

    function showToast(message) {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function formatMessageWithThinking(content) {
        if (!content) return '';

        let thinkingHtml = '';
        let remaining = content;

        // 移除各种思考标记，只保留正式回答（简化版，避免多余div）
        let cleanContent = content;
        cleanContent = cleanContent.replace(/~~~[\s\S]*?~~~/g, '');
        cleanContent = cleanContent.replace(/【思考】[\s\S]*?【\/思考】/g, '');
        cleanContent = cleanContent.replace(/^思考[：:][\s\S]*?(?=\n\n|\n?$)/gm, '');
        cleanContent = cleanContent.trim();

        let formattedAnswer = escapeHtml(cleanContent);
        formattedAnswer = formattedAnswer.replace(/\n/g, '<br>');
        formattedAnswer = formattedAnswer.replace(/• /g, '&nbsp;&nbsp;•&nbsp;');
        formattedAnswer = formattedAnswer.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

        return formattedAnswer;
    }

    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function copyToClipboard(text, messageId) {
        try {
            await navigator.clipboard.writeText(text);
            const btn = document.querySelector(`.copy-btn[data-msg-id="${messageId}"]`);
            if (btn) {
                btn.classList.add('copied');
                btn.innerHTML = '✓ 已复制';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = '📋 复制';
                }, 2000);
            }
            showToast('已复制');
        } catch (err) {
            showToast('复制失败');
        }
    }

    function extractPureText(content) {
        let text = content;
        text = text.replace(/~~~[\s\S]*?~~~/g, '');
        text = text.replace(/【思考】[\s\S]*?【\/思考】/g, '');
        text = text.replace(/^思考[：:][\s\S]*?(?=\n\n|\n?$)/gm, '');
        return text.trim();
    }

    function autoResizeTextarea() {
        const textarea = document.getElementById('messageInput');
        textarea.style.height = 'auto';
        const newHeight = Math.min(textarea.scrollHeight, 80);
        textarea.style.height = newHeight + 'px';
    }

    function getSessions() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            return JSON.parse(stored);
        }
        const defaultSession = {
            id: Date.now().toString(),
            title: '新会话',
            createTime: new Date().toLocaleString(),
            messages: [{
                role: 'assistant',
                content: '您好！我是硅谷小智🏥，北京协和医学院的智能医疗助手。\n\n我可以为您提供：\n• AI分导诊：根据病情推荐合适科室\n• AI挂号助手：查询号源、预约挂号、取消挂号\n• 医疗咨询：提供专业的医疗建议\n\n请问有什么可以帮助您的吗？',
                timestamp: Date.now()
            }]
        };
        return [defaultSession];
    }

    function saveSessions(sessions) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
    }

    function getCurrentSession() {
        const sessions = getSessions();
        return sessions.find(s => s.id === currentSessionId);
    }

    function updateCurrentSession(messages) {
        const sessions = getSessions();
        const index = sessions.findIndex(s => s.id === currentSessionId);
        if (index !== -1) {
            sessions[index].messages = [...messages];
            const firstUserMsg = sessions[index].messages.find(m => m.role === 'user');
            if (firstUserMsg && sessions[index].title === '新会话') {
                let title = firstUserMsg.content.substring(0, 20);
                if (firstUserMsg.content.length > 20) title += '...';
                sessions[index].title = title;
            }
            saveSessions(sessions);
            renderSessionList();
        }
    }

    function renderMessages() {
        const session = getCurrentSession();
        if (!session) return;

        const messagesArea = document.getElementById('messagesArea');
        const messages = session.messages || [];

        if (messages.length === 0) {
            messagesArea.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">暂无消息</div>';
            return;
        }

        let html = '';
        for (let i = 0; i < messages.length; i++) {
            const msg = messages[i];
            const msgId = `${currentSessionId}_${i}_${msg.timestamp}`;

            if (msg.role === 'assistant') {
                const pureText = extractPureText(msg.content);
                const displayHtml = formatMessageWithThinking(msg.content);
                html += `
                        <div class="message assistant">
                            <div class="message-avatar">🏥</div>
                            <div class="message-content-wrapper">
                                <div class="message-bubble">${displayHtml}</div>
                                <button class="copy-btn" data-msg-id="${msgId}" data-copy-text="${escapeHtml(pureText).replace(/"/g, '&quot;')}">📋 复制</button>
                            </div>
                        </div>
                    `;
            } else {
                html += `
                        <div class="message user">
                            <div class="message-content-wrapper">
                                <div class="message-bubble">${escapeHtml(msg.content).replace(/\n/g, '<br>')}</div>
                            </div>
                            <div class="message-avatar">👤</div>
                        </div>
                    `;
            }
        }
        messagesArea.innerHTML = html;

        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const text = btn.dataset.copyText;
                const msgId = btn.dataset.msgId;
                if (text) copyToClipboard(text, msgId);
            });
        });

        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function updateStreamingMessage(content) {
        const messagesArea = document.getElementById('messagesArea');

        if (!currentStreamingDiv) {
            currentStreamingDiv = document.createElement('div');
            currentStreamingDiv.className = 'message assistant';
            currentStreamingDiv.innerHTML = `
                    <div class="message-avatar">🏥</div>
                    <div class="message-content-wrapper">
                        <div class="message-bubble"></div>
                        <button class="copy-btn" style="opacity:0; pointer-events:none;">📋 复制</button>
                    </div>
                `;
            messagesArea.appendChild(currentStreamingDiv);
        }

        const bubble = currentStreamingDiv.querySelector('.message-bubble');
        const displayHtml = formatMessageWithThinking(content);
        bubble.innerHTML = displayHtml + '<span class="typing-cursor"></span>';
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function finishStreamingMessage(content) {
        if (!content || content.trim() === '') return;

        const session = getCurrentSession();
        if (session) {
            const messages = [...session.messages];
            messages.push({
                role: 'assistant',
                content: content,
                timestamp: Date.now()
            });
            updateCurrentSession(messages);
        }

        if (currentStreamingDiv) {
            currentStreamingDiv.remove();
            currentStreamingDiv = null;
        }
        renderMessages();
    }

    function addUserMessageAndSave(content) {
        const session = getCurrentSession();
        if (session) {
            const messages = [...session.messages];
            messages.push({
                role: 'user',
                content: content,
                timestamp: Date.now()
            });
            updateCurrentSession(messages);
        }
        renderMessages();
    }

    function renderSessionList() {
        const sessions = getSessions();
        const container = document.getElementById('sessionList');

        container.innerHTML = sessions.map(session => `
                <div class="session-item ${session.id === currentSessionId ? 'active' : ''}" data-id="${session.id}">
                    <div class="session-info">
                        <div class="session-title">${escapeHtml(session.title)}</div>
                        <div class="session-time">${session.createTime}</div>
                    </div>
                    <button class="delete-session" data-id="${session.id}">🗑️</button>
                </div>
            `).join('');

        document.querySelectorAll('.session-item').forEach(el => {
            el.addEventListener('click', (e) => {
                if (!e.target.classList.contains('delete-session')) {
                    switchSession(el.dataset.id);
                }
            });
        });

        document.querySelectorAll('.delete-session').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteSession(btn.dataset.id);
            });
        });
    }

    function switchSession(sessionId) {
        if (currentStreamingDiv) {
            currentStreamingDiv.remove();
            currentStreamingDiv = null;
        }
        currentStreamingContent = '';
        isWaiting = false;
        currentSessionId = sessionId;
        document.getElementById('sendBtn').disabled = false;
        renderMessages();
        renderSessionList();
    }

    function createNewSession() {
        const newSession = {
            id: Date.now().toString(),
            title: '新会话',
            createTime: new Date().toLocaleString(),
            messages: [{
                role: 'assistant',
                content: '您好！我是硅谷小智🏥，北京协和医学院的智能医疗助手。\n\n我可以为您提供：\n• AI分导诊：根据病情推荐合适科室\n• AI挂号助手：查询号源、预约挂号、取消挂号\n• 医疗咨询：提供专业的医疗建议\n\n请问有什么可以帮助您的吗？',
                timestamp: Date.now()
            }]
        };
        const sessions = getSessions();
        sessions.unshift(newSession);
        saveSessions(sessions);
        switchSession(newSession.id);
    }

    function deleteSession(sessionId) {
        const sessions = getSessions();
        if (sessions.length === 1) {
            showToast('至少保留一个会话');
            return;
        }
        const newSessions = sessions.filter(s => s.id !== sessionId);
        saveSessions(newSessions);
        if (currentSessionId === sessionId) {
            switchSession(newSessions[0].id);
        } else {
            renderSessionList();
        }
    }

    async function sendMessage(messageText) {
        if (isWaiting) return;

        let message = messageText;
        if (!message) {
            const input = document.getElementById('messageInput');
            message = input.value.trim();
            if (!message) return;
            input.value = '';
            autoResizeTextarea();
        }

        addUserMessageAndSave(message);

        isWaiting = true;
        document.getElementById('sendBtn').disabled = true;
        currentStreamingContent = '';
        if (currentStreamingDiv) {
            currentStreamingDiv.remove();
            currentStreamingDiv = null;
        }

        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 60000);

            const response = await fetch(`${BACKEND_URL}/xiaozhi/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    memoryId: currentSessionId,
                    message: message
                }),
                signal: controller.signal
            });

            clearTimeout(timeoutId);

            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value, { stream: true });
                currentStreamingContent += chunk;
                updateStreamingMessage(currentStreamingContent);
            }

            finishStreamingMessage(currentStreamingContent);

        } catch (error) {
            console.error('发送失败:', error);
            if (currentStreamingDiv) {
                currentStreamingDiv.remove();
                currentStreamingDiv = null;
            }
            let errorMsg = '抱歉，服务暂时不可用，请稍后再试。';
            if (error.name === 'AbortError') errorMsg = '请求超时，请稍后重试。';
            const session = getCurrentSession();
            if (session) {
                const messages = [...session.messages];
                messages.push({ role: 'assistant', content: errorMsg, timestamp: Date.now() });
                updateCurrentSession(messages);
            }
            renderMessages();
        } finally {
            isWaiting = false;
            document.getElementById('sendBtn').disabled = false;
            currentStreamingContent = '';
            currentStreamingDiv = null;
            document.getElementById('messageInput').focus();
        }
    }

    function onKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function init() {
        const sessions = getSessions();
        currentSessionId = sessions[0].id;
        renderMessages();
        renderSessionList();

        document.getElementById('sendBtn').addEventListener('click', () => sendMessage());
        document.getElementById('newChatBtn').addEventListener('click', createNewSession);
        const textarea = document.getElementById('messageInput');
        textarea.addEventListener('input', autoResizeTextarea);
        textarea.addEventListener('keydown', onKeyDown);

        document.querySelectorAll('.quick-question').forEach(el => {
            el.addEventListener('click', () => {
                const question = el.dataset.question;
                if (question && !isWaiting) sendMessage(question);
            });
        });

        textarea.focus();
    }

    init();
</script>
</body>
</html>
